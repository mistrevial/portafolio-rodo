<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>002</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <script src="archivos-olvidados-media/p5.js"></script>
  <script src="archivos-olvidados-media/p5.sound.min.js"></script>
  <style>
    :root {
      --shift-left: 5cm;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: "Space Mono", "Lucida Console", "Courier New", Courier, monospace;
      background: #fff;
      color: #111;
      padding: 24px 24px 24px var(--shift-left);
      overflow-x: hidden;
    }

    .back-arrow {
      position: fixed;
      top: 24px;
      left: 14px;
      z-index: 1000;
      color: #111;
      text-decoration: none;
      font-size: 1.15cm;
      width: 1.3cm;
      height: 1.3cm;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      font-weight: 700;
      padding: 0;
    }

    .back-arrow:hover {
      opacity: 0.7;
    }

    .titulo {
      font-size: clamp(24px, 3vw, 34px);
      font-weight: 500;
      margin: 0 0 20px;
      align-self: flex-start;
      text-align: left;
    }

    main {
      width: min(1100px, 100%);
      margin: 0;
      align-self: center;
      transform: translateX(calc((24px - var(--shift-left)) / 2));
    }

    #contenedor-visual {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 52vh;
    }

    #contenedor-visual canvas {
      display: block;
      max-width: 100%;
      height: auto;
    }

    @media (max-width: 900px) {
      body {
        padding-left: 24px;
      }

      main {
        transform: none;
      }
    }
  </style>
</head>
<body>
  <a class="back-arrow" href="index.html" aria-label="Volver al index">&#8592;</a>
  <h1 class="titulo">002 Archivos Olvidados</h1>
  <main>
    <div id="contenedor-visual" aria-label="Pieza visual de Archivos Olvidados"></div>
  </main>

  <script>
    let imagenActual;
    let imagenAjustada;
    let lienzo;
    let inicio;
    let tamanoPieza = 50;
    let audio;
    const CARPETA_MEDIA = "archivos-olvidados-media/";
    const ARCHIVOS_IMAGEN = [
      "01.jpg",
      "0101.jpg",
      "02.jpg",
      "03.jpg",
      "04.jpg",
      "05.jpg",
      "06.jpg",
      "07.jpg",
      "08.jpg",
      "09.jpg",
      "10.jpg"
    ];
    const DURACION_BUCLE_MS = 47000;
    const CAMBIO_IMAGEN_MS = DURACION_BUCLE_MS / ARCHIVOS_IMAGEN.length;
    let imagenes = [];
    let indiceActual = 0;

    function preload() {
      for (let i = 0; i < ARCHIVOS_IMAGEN.length; i++) {
        imagenes.push(loadImage(`${CARPETA_MEDIA}${ARCHIVOS_IMAGEN[i]}`));
      }
      imagenActual = imagenes[0];
      soundFormats("mp3");
      audio = loadSound(`${CARPETA_MEDIA}archivoaudio1.mp3`);
    }

    function setup() {
      ajustarLienzo();
      frameRate(30);
      inicio = millis();
      iniciarAudio();
    }

    function iniciarAudio() {
      if (!audio) return;
      if (!audio.isPlaying()) {
        audio.setLoop(true);
        audio.play();
      }
    }

    function mousePressed() {
      userStartAudio();
      iniciarAudio();
    }

    function draw() {
      let tiempo = millis() - inicio;
      actualizarImagen(tiempo);
      background(255);

      if (tiempo < 6000) {
        imagenAjustada.loadPixels();
        for (let y = 0; y < imagenAjustada.height; y++) {
          let desplazamiento = sin(y * 0.05 + tiempo * 0.002) * 5;
          copy(imagenAjustada, 0, y, imagenAjustada.width, 1, desplazamiento, y, imagenAjustada.width, 1);
        }
      } else if (tiempo < 20000) {
        imagenAjustada.loadPixels();
        let progreso = map(tiempo, 6000, 20000, 0, 1);
        let separacion = lerp(2, 30, progreso);

        for (let y = 0; y < imagenAjustada.height; y += separacion) {
          for (let x = 0; x < imagenAjustada.width; x += separacion) {
            let indice = (int(x) + int(y) * imagenAjustada.width) * 4;
            let rojo = imagenAjustada.pixels[indice];
            let verde = imagenAjustada.pixels[indice + 1];
            let azul = imagenAjustada.pixels[indice + 2];
            let gris = (rojo + verde + azul) / 3;
            let opacidad = map(progreso, 0, 1, 255, 80);
            fill(gris, opacidad);
            noStroke();
            ellipse(x, y, separacion * 0.2, separacion * 0.2);
          }
        }

        let intensidad = map(tiempo, 6000, 20000, 2, 30);
        for (let y = 0; y < imagenAjustada.height; y++) {
          let corrimientoX = floor(random(-intensidad, intensidad));
          copy(imagenAjustada, 0, y, imagenAjustada.width, 1, corrimientoX, y, imagenAjustada.width, 1);
        }
      } else if (tiempo < 26000) {
        imagenAjustada.loadPixels();
        let cuadricula = 2;
        for (let y = 0; y < imagenAjustada.height; y += cuadricula) {
          for (let x = 0; x < imagenAjustada.width; x += cuadricula) {
            let indice = (int(x) + int(y) * imagenAjustada.width) * 4;
            let rojo = imagenAjustada.pixels[indice];
            let verde = imagenAjustada.pixels[indice + 1];
            let azul = imagenAjustada.pixels[indice + 2];
            let desplazamiento = sin(millis() * 0.005 + x * y * 0.01) * 20;
            fill(rojo, verde, azul);
            noStroke();
            rect(x + desplazamiento, y + desplazamiento, cuadricula, cuadricula);
          }
        }
      } else if (tiempo < 30000) {
        let progreso = map(tiempo, 26000, 30000, 0, 1);
        let fuerza = lerp(5, 30, progreso);
        imagenAjustada.loadPixels();

        for (let y = 0; y < imagenAjustada.height; y++) {
          for (let x = 0; x < imagenAjustada.width; x++) {
            let indice = (x + y * imagenAjustada.width) * 4;
            let rojo = imagenAjustada.pixels[indice];
            let verde = imagenAjustada.pixels[indice + 1];
            let azul = imagenAjustada.pixels[indice + 2];
            let corrimientoX = sin(millis() * 0.002 + y * 0.1) * fuerza;
            let corrimientoY = cos(millis() * 0.002 + x * 0.1) * fuerza;
            let nuevoX = constrain(x + corrimientoX, 0, imagenAjustada.width - 1);
            let nuevoY = constrain(y + corrimientoY, 0, imagenAjustada.height - 1);
            let nuevoIndice = (int(nuevoX) + int(nuevoY) * imagenAjustada.width) * 4;
            imagenAjustada.pixels[nuevoIndice] = rojo;
            imagenAjustada.pixels[nuevoIndice + 1] = verde;
            imagenAjustada.pixels[nuevoIndice + 2] = azul;
          }
        }

        imagenAjustada.updatePixels();
        image(imagenAjustada, 0, 0);
      } else if (tiempo < 36000) {
        let tamanoMini = tamanoPieza / 8;
        let piezas = [];
        let piezasMezcladas = [];
        let totalX = floor(width / tamanoMini);
        let totalY = floor(height / tamanoMini);

        for (let y = 0; y < totalY; y++) {
          for (let x = 0; x < totalX; x++) {
            let origenX = x * tamanoMini;
            let origenY = y * tamanoMini;
            let destinoX = x * tamanoMini;
            let destinoY = y * tamanoMini;
            piezas.push({ origenX, origenY, destinoX, destinoY });
          }
        }

        piezasMezcladas = shuffle([...piezas]);

        for (let i = 0; i < piezas.length; i++) {
          let pieza = piezas[i];
          let destino = piezasMezcladas[i];
          let temblorX = random(-3, 3);
          let temblorY = random(-3, 3);

          image(
            imagenAjustada,
            destino.destinoX + temblorX,
            destino.destinoY + temblorY,
            tamanoMini,
            tamanoMini,
            pieza.origenX,
            pieza.origenY,
            tamanoMini,
            tamanoMini
          );
        }
      } else if (tiempo < 41000) {
        background(0);
        let pulso = sin(tiempo * 0.1) * 8 + random(-3, 3);
        let tamanoCirculo = 10 + pulso;
        let corrimientoX = random(-2, 2);
        let corrimientoY = random(-2, 2);
        fill(255);
        noStroke();
        ellipse(width / 2 + corrimientoX, height / 2 + corrimientoY, tamanoCirculo, tamanoCirculo);
      } else if (tiempo < DURACION_BUCLE_MS) {
        indiceActual = 0;
        imagenActual = imagenes[0];
        imagenAjustada = imagenActual.get();
        imagenAjustada.resize(width, height);
        inicio = millis();
      }
    }

    function actualizarImagen(tiempo) {
      if (!imagenes.length) return;
      const siguienteIndice = floor(tiempo / CAMBIO_IMAGEN_MS) % imagenes.length;
      if (siguienteIndice === indiceActual) return;
      indiceActual = siguienteIndice;
      imagenActual = imagenes[indiceActual];
      imagenAjustada = imagenActual.get();
      imagenAjustada.resize(width, height);
    }

    function limitesContenedor() {
      const contenedor = document.getElementById("contenedor-visual");
      const rectangulo = contenedor.getBoundingClientRect();
      const maximoAncho = Math.max(280, rectangulo.width);
      const maximoAlto = Math.max(240, window.innerHeight - 180);
      return { maximoAncho, maximoAlto };
    }

    function ajustarLienzo() {
      let proporcion = imagenActual.width / imagenActual.height;
      let limites = limitesContenedor();
      let ancho = limites.maximoAncho;
      let alto = ancho / proporcion;

      if (alto > limites.maximoAlto) {
        alto = limites.maximoAlto;
        ancho = alto * proporcion;
      }

      if (!lienzo) {
        lienzo = createCanvas(ancho, alto);
        lienzo.parent("contenedor-visual");
      } else {
        resizeCanvas(ancho, alto);
      }

      imagenAjustada = imagenActual.get();
      imagenAjustada.resize(width, height);
    }

    function windowResized() {
      ajustarLienzo();
    }
  </script>
</body>
</html>
