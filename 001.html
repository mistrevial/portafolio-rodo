      margin: 0 0 24px;
      align-self: flex-start;

      width: min(900px, 100%);
      margin: auto 0 clamp(96px, 14vh, 170px) 0;
      align-self: center;
      transform: translateX(calc((24px - var(--shift-left)) / 2));
      text-align: center;
